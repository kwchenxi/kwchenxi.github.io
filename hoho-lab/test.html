<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .success {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            border-radius: 5px;

            margin-top: 20px;
        }

<body>
    <h1>测试页面加载成功！</h1>
    <div class="success">
        ✅ 服务器运行正常，页面可以正常访问
    </div>
    <p>如果你能看到这个页面，说明HTTP服务器工作正常。</p>
</body>
</html>
